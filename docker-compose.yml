services:
  mqtt-server:
    container_name: mqtt-server
    build: ./mqtt-server
    env_file:
     - ./.env
    network_mode: host
    restart: unless-stopped

  mqtt-subscriber:
    container_name: mqtt-subscriber
    build: ./mqtt-subscriber
    env_file:
     - ./.env
    network_mode: host
    restart: unless-stopped
    depends_on:
      mqtt-server:
        condition: service_started
      mysql:
        condition: service_healthy  # remove this line if using external MySQL

  web:
    container_name: web
    build: ./web
    env_file:
     - ./.env
    network_mode: host
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy  # remove this line if using external MySQL
    stdin_open: true

  mysql:
    container_name: mysql
    image: mysql:8.0
    env_file:
      - ./.env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQLDB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
    volumes:
      - ./sensordump.sql:/docker-entrypoint-initdb.d/sensordump.sql
      - mysql-data:/var/lib/mysql
    network_mode: host
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 6

  # To use an external MySQL instead of the containerized one:
  #   1. Comment out the mysql service above and the mysql-data volume below.
  #   2. Remove the mysql depends_on entries from mqtt-subscriber and web above.
  #   3. Set DB_HOST to your external MySQL host in .env.
  #   4. Create the schema manually: mysql -h host -u user -p sensordata < sensordump.sql

volumes:
  mysql-data:
