<link href="/css/style.css" rel="stylesheet" type="text/css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
<script src="https://cdn.socket.io/4.4.0/socket.io.min.js" integrity="sha384-1fOn6VtTq3PWwfsOrk45LnYcGosJwzMHv+Xh/Jx5303FVOXzEnw0EpLv30mtjmlj" crossorigin="anonymous"></script>
<script>window._headerConfig = { nav: 'live' }; document.title = 'Live — wskit';</script>
<div id="page-header"></div>
<script src="/js/header.js"></script>

<div id="map"></div>
<div id="map-no-collectors-hint" class="map-hint" style="display:none">
    No collectors on the map yet.<br>
    Go to <a href="/settings">Settings</a> to add coordinates to your collectors.
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<script>
const socket = io();

// ── Map init ─────────────────────────────────────────────────────────────────
const map = L.map('map', { zoomControl: true }).setView([39.5, -98.35], 5);

L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    attribution: 'Tiles &copy; Esri &mdash; Source: Esri, USGS, NOAA',
    maxNativeZoom: 19,
    maxZoom: 21,
}).addTo(map);

// ── Marker helpers ────────────────────────────────────────────────────────────
function popupHtml(d) {
    const tempF    = d.temperature != null ? ((d.temperature * 9/5) + 32).toFixed(1) + '°F' : '—';
    const humidity = d.humidity    != null ? Number(d.humidity).toFixed(1) + '%'             : '—';
    const pressure = d.pressure    != null ? Number(d.pressure).toFixed(2) + ' hPa'          : '—';
    const time     = new Date(d.recorded_at).toLocaleString('en-US');
    const name     = d.collector_name || d.collector_id;
    const id       = d.collector_id;

    return `<div class="collector-popup">
        <div class="popup-name" style="${d.collector_id === primaryCollectorId ? 'color:#2ecc71' : ''}">${name}</div>
        <div class="popup-id">${id}</div>
        <div class="popup-readings">
            <div class="popup-row"><span class="popup-label">TEMP</span><span class="popup-value">${tempF}</span></div>
            <div class="popup-row"><span class="popup-label">HUMIDITY</span><span class="popup-value">${humidity}</span></div>
            <div class="popup-row"><span class="popup-label">PRESSURE</span><span class="popup-value">${pressure}</span></div>
            <div class="popup-row"><span class="popup-label">UPDATED</span><span class="popup-value popup-time">${time}</span></div>
        </div>
    </div>`;
}

// ── Marker registry ───────────────────────────────────────────────────────────
// keyed by collector_id → { marker, data }
const collectors = new Map();
let primaryCollectorId = null;

const noCollectorsHint = document.getElementById('map-no-collectors-hint');

function syncHint() {
    noCollectorsHint.style.display = collectors.size === 0 ? 'block' : 'none';
}

function makeIcon(isPrimary) {
    return L.divIcon({
        className: 'collector-marker-wrap',
        html: `<div class="collector-marker-dot${isPrimary ? ' primary' : ''}"></div>`,
        iconSize: [18, 18],
        iconAnchor: [9, 9],
        popupAnchor: [0, -14],
    });
}

function addOrUpdateCollector(d) {
    if (!d.lat || !d.lng) return;
    const isPrimary = d.collector_id === primaryCollectorId;

    if (collectors.has(d.collector_id)) {
        const entry = collectors.get(d.collector_id);
        entry.data = d;
        entry.marker.getPopup().setContent(popupHtml(d));
    } else {
        const marker = L.marker([d.lat, d.lng], { icon: makeIcon(isPrimary) })
            .bindPopup(popupHtml(d), { className: 'collector-popup-wrap', maxWidth: 260 })
            .addTo(map);
        collectors.set(d.collector_id, { marker, data: d });
        syncHint();
    }
}

function syncPrimaryIcon() {
    collectors.forEach((entry, id) => {
        entry.marker.setIcon(makeIcon(id === primaryCollectorId));
    });
}

// ── Load real collectors from API ────────────────────────────────────────────
(async () => {
    try {
        const [collectorsRes, settingsRes] = await Promise.all([
            fetch('/api/collectors'),
            fetch('/api/settings'),
        ]);
        if (settingsRes.ok) {
            const settings = await settingsRes.json();
            primaryCollectorId = settings.primary_collector_id || null;
        }
        if (!collectorsRes.ok) { syncHint(); return; }
        const list = await collectorsRes.json();
        list.forEach(c => {
            if (!c.lat || !c.lng) return;
            addOrUpdateCollector({
                collector_id:   c.id,
                collector_name: c.name || c.id,
                lat:            parseFloat(c.lat),
                lng:            parseFloat(c.lng),
                temperature:    null,
                humidity:       null,
                pressure:       null,
                recorded_at:    c.last_seen || c.created_at,
            });
        });
    } catch (_) {}
    syncHint();
    if (collectors.size > 0) {
        const bounds = L.latLngBounds([...collectors.values()].map(e => [e.data.lat, e.data.lng]));
        map.fitBounds(bounds, { padding: [60, 60], maxZoom: 14 });
    }
})();

// ── Live updates via Socket.IO ────────────────────────────────────────────────
socket.on('data-from-server', function (raw) {
    const d = JSON.parse(raw);
    if (d.lat) d.lat = parseFloat(d.lat);
    if (d.lng) d.lng = parseFloat(d.lng);
    addOrUpdateCollector(d);
});
</script>
