<link href="/css/style.css" rel="stylesheet" type="text/css">
<script src="https://cdn.socket.io/4.4.0/socket.io.min.js" integrity="sha384-1fOn6VtTq3PWwfsOrk45LnYcGosJwzMHv+Xh/Jx5303FVOXzEnw0EpLv30mtjmlj" crossorigin="anonymous"></script>
<script>window._headerConfig = { title: 'Weather Readings', icon: '🌡️', nav: 'live' };</script>
<div id="page-header"></div>
<script src="/js/header.js"></script>
<p id="newest-label">&#8593; Newest first &mdash; showing last 20 readings</p>
<div id="databox"></div>

<script>
const socket = io();
const MAX_READINGS = 20;
const shownIds = new Set();
const dataDiv = document.getElementById('databox');

const timeOptions = { hour12: true, hour: '2-digit', minute: '2-digit', second: '2-digit' };

function displayReading(jsonData) {
	if (jsonData.id != null) {
		if (shownIds.has(jsonData.id)) return;
		shownIds.add(jsonData.id);
	}

	const temp_f = ((jsonData.temperature * 9/5) + 32).toFixed(1);
	const humidity = Number(jsonData.humidity).toFixed(1);
	const newtime = new Date(jsonData.recorded_at).toLocaleTimeString('en-US', timeOptions);
	const displayId = jsonData.collector_name
		? jsonData.collector_name + ' (' + jsonData.collector_id + ')'
		: jsonData.collector_id;
	const message = newtime + ': HOST ' + displayId + ', TEMPERATURE ' + temp_f + '° F, HUMIDITY ' + humidity + '%, PRESSURE ' + jsonData.pressure;

	const span = document.createElement('span');
	span.textContent = message;
	dataDiv.insertBefore(span, dataDiv.firstChild);

	while (dataDiv.children.length > MAX_READINGS) {
		dataDiv.removeChild(dataDiv.lastChild);
	}
}

fetch('/api/readings?limit=20')
	.then(r => r.json())
	.then(rows => rows.reverse().forEach(displayReading))
	.catch(() => {});

socket.on('data-from-server', function (data) {
	displayReading(JSON.parse(data));
});
</script>
