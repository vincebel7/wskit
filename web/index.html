<link href="/css/style.css" rel="stylesheet" type="text/css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
<script src="https://cdn.socket.io/4.4.0/socket.io.min.js" integrity="sha384-1fOn6VtTq3PWwfsOrk45LnYcGosJwzMHv+Xh/Jx5303FVOXzEnw0EpLv30mtjmlj" crossorigin="anonymous"></script>
<script>window._headerConfig = { nav: 'live' }; document.title = 'Live — wskit';</script>
<div id="page-header"></div>
<script src="/js/header.js"></script>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<script>
const socket = io();

// ── Hardcoded test device ────────────────────────────────────────────────────
const TEST_DEVICE = {
    collector_id:   'AA:BB:CC:DD:EE:FF',
    collector_name: 'Test Station',
    lat:            42.33014307395171,
    lng:            -83.04066467154485,
    temperature:    21.8,
    humidity:       51.3,
    pressure:       1013.40,
    recorded_at:    new Date().toISOString(),
};

// ── Map init ─────────────────────────────────────────────────────────────────
const map = L.map('map', { zoomControl: true }).setView([TEST_DEVICE.lat, TEST_DEVICE.lng], 15);

L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    attribution: 'Tiles &copy; Esri &mdash; Source: Esri, USGS, NOAA',
    maxNativeZoom: 19,
    maxZoom: 21,
}).addTo(map);

// ── Marker helpers ────────────────────────────────────────────────────────────
function makeIcon() {
    return L.divIcon({
        className: 'collector-marker-wrap',
        html: '<div class="collector-marker-dot"></div>',
        iconSize: [18, 18],
        iconAnchor: [9, 9],
        popupAnchor: [0, -14],
    });
}

function popupHtml(d) {
    const tempF    = d.temperature != null ? ((d.temperature * 9/5) + 32).toFixed(1) + '°F' : '—';
    const humidity = d.humidity    != null ? Number(d.humidity).toFixed(1) + '%'             : '—';
    const pressure = d.pressure    != null ? Number(d.pressure).toFixed(2) + ' hPa'          : '—';
    const time     = new Date(d.recorded_at).toLocaleString('en-US');
    const name     = d.collector_name || d.collector_id;
    const id       = d.collector_id;

    return `<div class="collector-popup">
        <div class="popup-name">${name}</div>
        <div class="popup-id">${id}</div>
        <div class="popup-readings">
            <div class="popup-row"><span class="popup-label">TEMP</span><span class="popup-value">${tempF}</span></div>
            <div class="popup-row"><span class="popup-label">HUMIDITY</span><span class="popup-value">${humidity}</span></div>
            <div class="popup-row"><span class="popup-label">PRESSURE</span><span class="popup-value">${pressure}</span></div>
            <div class="popup-row"><span class="popup-label">UPDATED</span><span class="popup-value popup-time">${time}</span></div>
        </div>
    </div>`;
}

// ── Marker registry ───────────────────────────────────────────────────────────
// keyed by collector_id → { marker, data }
const collectors = new Map();

function addOrUpdateCollector(d) {
    if (!d.lat || !d.lng) return;

    if (collectors.has(d.collector_id)) {
        const entry = collectors.get(d.collector_id);
        entry.data = d;
        entry.marker.getPopup().setContent(popupHtml(d));
    } else {
        const marker = L.marker([d.lat, d.lng], { icon: makeIcon() })
            .bindPopup(popupHtml(d), { className: 'collector-popup-wrap', maxWidth: 260 })
            .addTo(map);
        collectors.set(d.collector_id, { marker, data: d });
    }
}

// ── Seed hardcoded test device ────────────────────────────────────────────────
addOrUpdateCollector(TEST_DEVICE);

// ── Live updates via Socket.IO ────────────────────────────────────────────────
socket.on('data-from-server', function (raw) {
    const d = JSON.parse(raw);
    // When collectors have lat/lng from the API, this will place them on the map.
    // For now only devices with coordinates are rendered.
    addOrUpdateCollector(d);
});
</script>
