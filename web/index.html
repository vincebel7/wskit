<link href="/css/style.css" rel="stylesheet" type="text/css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
<script src="https://cdn.socket.io/4.4.0/socket.io.min.js" integrity="sha384-1fOn6VtTq3PWwfsOrk45LnYcGosJwzMHv+Xh/Jx5303FVOXzEnw0EpLv30mtjmlj" crossorigin="anonymous"></script>
<script>window._headerConfig = { nav: 'live' }; document.title = 'Live — wskit';</script>
<div id="page-header"></div>
<script src="/js/header.js"></script>

<div id="view-toggle">
    <button id="btn-map"  class="view-btn active" onclick="setView('map')">Map</button>
    <button id="btn-list" class="view-btn"         onclick="setView('list')">List</button>
</div>

<div id="map-view">
    <div id="map"></div>
    <div id="map-no-collectors-hint" class="map-hint" style="display:none">
        No collectors on the map yet.<br>
        Go to <a href="/settings">Settings</a> to add coordinates to your collectors.
    </div>
</div>

<div id="list-view" style="display:none">
    <div id="collector-list"></div>
    <div id="list-no-collectors-hint" class="list-hint" style="display:none">
        No collectors found.<br>
        Connect a collector or check your server configuration.
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<script>
const socket = io();

let serverTz = 'America/New_York';

// ── View toggle ───────────────────────────────────────────────────────────────
function setView(v) {
    document.getElementById('map-view').style.display  = v === 'map'  ? 'block' : 'none';
    document.getElementById('list-view').style.display = v === 'list' ? 'block' : 'none';
    document.getElementById('btn-map').classList.toggle('active',  v === 'map');
    document.getElementById('btn-list').classList.toggle('active', v === 'list');
    if (v === 'map') map.invalidateSize();
}

// ── Map init ─────────────────────────────────────────────────────────────────
const map = L.map('map', { zoomControl: true, closePopupOnClick: false }).setView([39.5, -98.35], 5);

L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    attribution: 'Tiles &copy; Esri &mdash; Source: Esri, USGS, NOAA',
    maxNativeZoom: 19,
    maxZoom: 21,
}).addTo(map);

// ── Shared data helpers ───────────────────────────────────────────────────────
function fmtTemp(v)     { return v != null ? ((v * 9/5) + 32).toFixed(1) + '°F' : '—'; }
function fmtHumidity(v) { return v != null ? Number(v).toFixed(1) + '%'          : '—'; }
function fmtPressure(v) { return v != null ? Number(v).toFixed(2) + ' hPa'       : '—'; }
function fmtTime(v)     { return v        ? new Date(v).toLocaleString('en-US', { timeZone: serverTz }) : '—'; }

// ── Map popup HTML ────────────────────────────────────────────────────────────
function popupHtml(d) {
    const name     = d.collector_name || d.collector_id;
    const location = d.location || null;

    return `<div class="collector-popup">
        <div class="popup-name" style="${d.collector_id === primaryCollectorId ? 'color:#2ecc71' : ''}">${name}</div>
        <div class="popup-id">${d.collector_id}</div>
        ${location ? `<div class="popup-location">${location}</div>` : ''}
        <div class="popup-readings">
            <div class="popup-row"><span class="popup-label">TEMP</span><span class="popup-value">${fmtTemp(d.temperature)}</span></div>
            <div class="popup-row"><span class="popup-label">HUMIDITY</span><span class="popup-value">${fmtHumidity(d.humidity)}</span></div>
            <div class="popup-row"><span class="popup-label">PRESSURE</span><span class="popup-value">${fmtPressure(d.pressure)}</span></div>
            <div class="popup-row"><span class="popup-label">UPDATED</span><span class="popup-value popup-time">${fmtTime(d.recorded_at)}</span></div>
        </div>
    </div>`;
}

// ── List card HTML ────────────────────────────────────────────────────────────
function listCardHtml(d) {
    const name      = d.collector_name || d.collector_id;
    const location  = d.location || null;
    const isPrimary = d.collector_id === primaryCollectorId;

    return `<div class="list-card${isPrimary ? ' primary' : ''}" id="lc-${CSS.escape(d.collector_id)}">
        <div class="list-card-name${isPrimary ? ' primary' : ''}">${name}</div>
        <div class="list-card-id">${d.collector_id}</div>
        ${location ? `<div class="list-card-location">${location}</div>` : ''}
        <div class="list-readings">
            <div class="list-row"><span class="list-label">TEMP</span><span class="list-value">${fmtTemp(d.temperature)}</span></div>
            <div class="list-row"><span class="list-label">HUMIDITY</span><span class="list-value">${fmtHumidity(d.humidity)}</span></div>
            <div class="list-row"><span class="list-label">PRESSURE</span><span class="list-value">${fmtPressure(d.pressure)}</span></div>
            <div class="list-row"><span class="list-label">UPDATED</span><span class="list-value list-time">${fmtTime(d.recorded_at)}</span></div>
        </div>
    </div>`;
}

// ── Collector registry ────────────────────────────────────────────────────────
// keyed by collector_id → { marker: L.Marker|null, data: object }
const collectors = new Map();
let primaryCollectorId = null;

function syncMapHint() {
    const hasMarkers = [...collectors.values()].some(e => e.marker);
    document.getElementById('map-no-collectors-hint').style.display = hasMarkers ? 'none' : 'block';
}

function syncListHint() {
    document.getElementById('list-no-collectors-hint').style.display = collectors.size === 0 ? 'block' : 'none';
}

function makeIcon(isPrimary) {
    return L.divIcon({
        className: 'collector-marker-wrap',
        html: `<div class="collector-marker-dot${isPrimary ? ' primary' : ''}"></div>`,
        iconSize: [18, 18],
        iconAnchor: [9, 9],
        popupAnchor: [0, -14],
    });
}

function addOrUpdateCollector(d) {
    const isPrimary = d.collector_id === primaryCollectorId;

    if (collectors.has(d.collector_id)) {
        const entry = collectors.get(d.collector_id);
        entry.data = Object.assign({}, entry.data, d);
        if (entry.marker) entry.marker.getPopup().setContent(popupHtml(entry.data));
        const existing = document.getElementById('lc-' + CSS.escape(d.collector_id));
        if (existing) existing.outerHTML = listCardHtml(entry.data);
    } else {
        let marker = null;
        if (d.lat && d.lng) {
            marker = L.marker([d.lat, d.lng], { icon: makeIcon(isPrimary) })
                .bindPopup(popupHtml(d), { className: 'collector-popup-wrap', maxWidth: 260 })
                .addTo(map);
        }
        collectors.set(d.collector_id, { marker, data: d });
        document.getElementById('collector-list').insertAdjacentHTML('beforeend', listCardHtml(d));
        syncMapHint();
        syncListHint();
    }
}

function syncPrimaryIcon() {
    collectors.forEach((entry, id) => {
        if (entry.marker) entry.marker.setIcon(makeIcon(id === primaryCollectorId));
    });
}

// ── Smart popup placement ─────────────────────────────────────────────────────
// Tries candidates in preference order; picks first that fits within the map
// and doesn't cover any other marker dot.
map.on('popupopen', function (e) {
    const popup  = e.popup;
    const source = popup._source;
    if (!source) return;

    // Reset to neutral offset and render so we can measure popup dimensions.
    popup.options.offset = L.point(0, 0);
    popup.update();

    const el = popup.getElement();
    if (!el) return;
    el.style.visibility = 'hidden';

    requestAnimationFrame(() => {
        const { width: pw, height: ph } = el.getBoundingClientRect();
        const mapSize = map.getSize();
        const mPx     = map.latLngToContainerPoint(source.getLatLng());
        const PAD     = 10;
        // popupAnchor from makeIcon is [0, -14]; offset is added on top.
        // The anchor point (bottom of popup tip) lands at: mPx + [0,-14] + [ox,oy].
        // The full popup (content + tip) grows upward from that anchor.
        function bbox(ox, oy) {
            const ax = mPx.x + ox;
            const ay = mPx.y - 14 + oy;
            return { left: ax - pw / 2, right: ax + pw / 2, top: ay - ph, bottom: ay };
        }

        // Collect other marker centres in container px (with a small hit-radius).
        const otherPts = [];
        collectors.forEach(({ marker }) => {
            if (!marker || marker === source) return;
            const p = map.latLngToContainerPoint(marker.getLatLng());
            otherPts.push({ x: p.x, y: p.y, r: 12 });
        });

        function valid(b) {
            if (b.left   < PAD || b.right  > mapSize.x - PAD ||
                b.top    < PAD || b.bottom > mapSize.y - PAD) return false;
            return otherPts.every(p =>
                p.x - p.r >= b.right || p.x + p.r <= b.left ||
                p.y - p.r >= b.bottom || p.y + p.r <= b.top
            );
        }

        const half = pw / 2 + 10;
        // "down" shifts the popup below the marker: anchor moves down past the
        // marker dot (9px radius) plus the full popup height and some breathing room.
        const down  = ph + 14 + 9 + 8;

        const candidates = [
            [0,      0   ],   // above-centre  (default)
            [half,   0   ],   // above-right
            [-half,  0   ],   // above-left
            [0,      down],   // below-centre
            [half,   down],   // below-right
            [-half,  down],   // below-left
        ];

        let chosen = candidates[0];
        for (const [ox, oy] of candidates) {
            if (valid(bbox(ox, oy))) { chosen = [ox, oy]; break; }
        }

        popup.options.offset = L.point(chosen[0], chosen[1]);
        popup.update();
        el.style.visibility = '';
    });
});

// ── Load collectors from API ──────────────────────────────────────────────────
(async () => {
    try {
        const [collectorsRes, settingsRes, configRes] = await Promise.all([
            fetch('/api/collectors'),
            fetch('/api/settings'),
            fetch('/api/config'),
        ]);
        if (configRes.ok) {
            const config = await configRes.json();
            if (config.tz) serverTz = config.tz;
        }
        if (settingsRes.ok) {
            const settings = await settingsRes.json();
            primaryCollectorId = settings.primary_collector_id || null;
        }
        if (!collectorsRes.ok) { syncMapHint(); syncListHint(); return; }
        const list = await collectorsRes.json();
        list.forEach(c => {
            addOrUpdateCollector({
                collector_id:   c.id,
                collector_name: c.name || c.id,
                location:       c.location || null,
                lat:            c.lat ? parseFloat(c.lat) : null,
                lng:            c.lng ? parseFloat(c.lng) : null,
                temperature:    c.temperature ?? null,
                humidity:       c.humidity ?? null,
                pressure:       c.pressure ?? null,
                recorded_at:    c.last_seen || c.created_at,
            });
        });
    } catch (_) {}
    syncMapHint();
    syncListHint();
    const withCoords = [...collectors.values()].filter(e => e.marker);
    if (withCoords.length > 0) {
        const bounds = L.latLngBounds(withCoords.map(e => [e.data.lat, e.data.lng]));
        map.fitBounds(bounds, { padding: [60, 60] });
    }
})();

// ── Live updates via Socket.IO ────────────────────────────────────────────────
socket.on('data-from-server', function (raw) {
    const d = JSON.parse(raw);
    if (d.lat) d.lat = parseFloat(d.lat);
    if (d.lng) d.lng = parseFloat(d.lng);
    addOrUpdateCollector(d);
});
</script>
