<link href="/css/style.css" rel="stylesheet" type="text/css">
<script src="https://cdn.socket.io/4.4.0/socket.io.min.js" integrity="sha384-1fOn6VtTq3PWwfsOrk45LnYcGosJwzMHv+Xh/Jx5303FVOXzEnw0EpLv30mtjmlj" crossorigin="anonymous"></script>
<script>window._headerConfig = { title: 'Weather Readings', icon: '🌡️', nav: 'live' };</script>
<div id="page-header"></div>
<script src="/js/header.js"></script>
<p id="newest-label">&#8593; Newest first &mdash; showing last 100 readings</p>
<div id="databox"></div>

<script>
const socket = io();
const MAX_READINGS = 100;

socket.on('data-from-server', function (data) {
	var jsonData = JSON.parse(data);
	console.log(jsonData);
	var temp_c = jsonData['temperature'];
	var humidity = jsonData['humidity'];
	var pressure = jsonData['pressure'];
	var time = jsonData['recorded_at'];
	var id = jsonData['collector_id'];

	const timeOptions = {
		hour12: true,
		hour: "2-digit",
		minute: "2-digit",
		second: "2-digit"
	};

	var newtime = new Date(time).toLocaleTimeString("en-US", timeOptions);
	var temp_f = ((temp_c * 9/5) + 32).toFixed(1);
	var humidityFmt = Number(humidity).toFixed(1);

	var displayId = jsonData['collector_name'] ? jsonData['collector_name'] + ' (' + id + ')' : id;
	var message = newtime + ": HOST " + displayId + ", TEMPERATURE " + temp_f + "° F, HUMIDITY " + humidityFmt + "%, PRESSURE " + pressure;
	var dataDiv = document.getElementById('databox');

	var msgSpan = document.createElement("span");
	msgSpan.textContent = message;
	dataDiv.insertBefore(msgSpan, dataDiv.firstChild);

	while (dataDiv.children.length > MAX_READINGS) {
		dataDiv.removeChild(dataDiv.lastChild);
	}
});
</script>
