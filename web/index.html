<link href="/css/style.css" rel="stylesheet" type="text/css">
<script src="https://cdn.socket.io/4.4.0/socket.io.min.js" integrity="sha384-1fOn6VtTq3PWwfsOrk45LnYcGosJwzMHv+Xh/Jx5303FVOXzEnw0EpLv30mtjmlj" crossorigin="anonymous"></script>
<script>window._headerConfig = { title: 'Weather Readings', nav: 'live' };</script>
<div id="page-header"></div>
<script src="/js/header.js"></script>

<div style="max-width: 1200px; margin: 0 auto; padding: 0 16px;">
    <p id="newest-label">&#8593; Newest first &mdash; showing last 20 readings</p>
    <div class="table-wrap">
        <table class="data-table" id="live-table">
            <thead>
                <tr>
                    <th>Time</th>
                    <th>Collector</th>
                    <th>Temp (°F)</th>
                    <th>Humidity (%)</th>
                    <th>Pressure (hPa)</th>
                </tr>
            </thead>
            <tbody id="live-body"></tbody>
        </table>
    </div>
</div>

<script>
const socket = io();
const MAX_READINGS = 20;
const shownIds = new Set();
const tbody = document.getElementById('live-body');

function displayReading(jsonData) {
	if (jsonData.id != null) {
		if (shownIds.has(jsonData.id)) return;
		shownIds.add(jsonData.id);
	}

	const tempF    = jsonData.temperature != null ? ((jsonData.temperature * 9/5) + 32).toFixed(1) : '—';
	const humidity = jsonData.humidity    != null ? Number(jsonData.humidity).toFixed(1)            : '—';
	const pressure = jsonData.pressure    != null ? Number(jsonData.pressure).toFixed(2)            : '—';
	const time     = new Date(jsonData.recorded_at).toLocaleString('en-US');
	const name     = jsonData.collector_name
		? jsonData.collector_name + ' (' + jsonData.collector_id + ')'
		: jsonData.collector_id;

	const tr = document.createElement('tr');
	[time, name, tempF, humidity, pressure].forEach(val => {
		const td = document.createElement('td');
		td.textContent = val;
		tr.appendChild(td);
	});

	tbody.insertBefore(tr, tbody.firstChild);

	while (tbody.children.length > MAX_READINGS) {
		tbody.removeChild(tbody.lastChild);
	}
}

fetch('/api/readings?limit=20')
	.then(r => r.json())
	.then(rows => rows.reverse().forEach(displayReading))
	.catch(() => {});

socket.on('data-from-server', function (data) {
	displayReading(JSON.parse(data));
});
</script>
