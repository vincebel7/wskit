<link href="/css/style.css" rel="stylesheet" type="text/css">
<script>window._headerConfig = { title: 'Settings', icon: '⚙️', nav: 'settings' };</script>
<div id="page-header"></div>
<script src="/js/header.js"></script>

<div class="settings-layout">

    <!-- Left: Collectors -->
    <div class="settings-col-left">
        <div class="settings-section">
            <h2>Collectors</h2>
            <p class="section-desc">Registered sensor nodes.</p>
            <div id="collectors-container"></div>
        </div>
    </div>

    <!-- Right: config panels -->
    <div class="settings-col-right">

        <div class="settings-section">
            <h2>Primary Collector</h2>
            <p class="section-desc">The collector used as the main data source across the dashboard.</p>
            <div class="settings-grid">
                <label>
                    Collector
                    <select id="primary-collector-select">
                        <option value="">None</option>
                    </select>
                </label>
            </div>
            <div class="settings-footer">
                <button class="btn btn-primary" id="save-primary">Save</button>
                <span class="settings-status" id="primary-status"></span>
            </div>
        </div>

        <div class="settings-section">
            <h2>Weather Underground</h2>
            <p class="section-desc">Upload readings to a Weather Underground personal weather station. Not yet active.</p>
            <div class="settings-grid">
                <label>
                    Station ID
                    <input type="text" id="wu-station-id" placeholder="KXXXXXXXX">
                </label>
                <label>
                    API Key
                    <input type="password" id="wu-api-key" placeholder="••••••••••••••••">
                </label>
            </div>
            <div class="settings-footer">
                <button class="btn btn-primary" id="save-wu" disabled title="Not yet implemented">Save</button>
                <span class="settings-status" id="wu-status" style="color: var(--text-muted);">Coming soon</span>
            </div>
        </div>

    </div>
</div>

<script>
let serverTz = 'America/New_York';
function formatTime(ts) {
    return new Date(ts).toLocaleString('en-US', { timeZone: serverTz });
}

// ── Collectors ────────────────────────────────────────────────────────────────

async function loadCollectors() {
    const container = document.getElementById('collectors-container');
    const primarySel = document.getElementById('primary-collector-select');
    try {
        const [collectorsRes, settingsRes, configRes] = await Promise.all([
            fetch('/api/collectors'),
            fetch('/api/settings'),
            fetch('/api/config'),
        ]);
        if (configRes.ok) {
            const config = await configRes.json();
            if (config.tz) serverTz = config.tz;
        }
        if (!collectorsRes.ok) throw new Error((await collectorsRes.json()).error);
        const collectors = await collectorsRes.json();
        const settings = settingsRes.ok ? await settingsRes.json() : {};

        // Populate Primary Collector dropdown
        collectors.forEach(c => {
            const opt = document.createElement('option');
            opt.value = c.id;
            opt.textContent = c.name ? `${c.name} (${c.id})` : c.id;
            primarySel.appendChild(opt);
        });
        const saved = settings.primary_collector_id || '';
        if ([...primarySel.options].some(o => o.value === saved)) primarySel.value = saved;

        // Render collector cards
        container.innerHTML = '';
        if (!collectors.length) {
            const p = document.createElement('p');
            p.style.cssText = 'color: var(--text-muted); font-family: monospace;';
            p.textContent = 'No collectors registered yet.';
            container.appendChild(p);
            return;
        }
        const primaryId = settings.primary_collector_id || null;
        collectors.forEach(c => container.appendChild(buildCard(c, primaryId)));
    } catch (err) {
        const p = document.createElement('p');
        p.style.cssText = 'color: #e74c3c; font-family: monospace;';
        p.textContent = `Error loading collectors: ${err.message}`;
        container.appendChild(p);
    }
}

function buildCard(collector, primaryId) {
    const card = document.createElement('div');
    card.className = 'collector-card';

    const header = document.createElement('div');
    header.className = 'card-header';

    const left = document.createElement('div');
    const nameEl = document.createElement('h3');
    nameEl.textContent = collector.name || '(unnamed)';
    if (collector.id === primaryId) nameEl.style.color = '#2ecc71';
    const macEl = document.createElement('div');
    macEl.className = 'mac';
    macEl.textContent = collector.id;
    left.appendChild(nameEl);
    left.appendChild(macEl);

    const meta = document.createElement('div');
    meta.className = 'collector-meta';
    const created  = formatTime(collector.created_at);
    const lastSeen = collector.last_seen ? formatTime(collector.last_seen) : 'Never';
    meta.innerHTML =
        `Device: ${esc(collector.device_type) || '—'}<br>` +
        `Sensors: ${esc(collector.sensor_type) || '—'}<br>` +
        `Location: ${esc(collector.location) || '—'}<br>` +
        `Lat/Lng: ${collector.lat != null && collector.lng != null ? `${collector.lat}, ${collector.lng}` : '—'}<br>` +
        `Registered: ${created}<br>` +
        `Last seen: ${lastSeen}`;

    header.appendChild(left);
    header.appendChild(meta);
    card.appendChild(header);

    const editBtn = document.createElement('button');
    editBtn.className = 'btn btn-primary';
    editBtn.textContent = 'Edit';
    editBtn.style.marginTop = '10px';
    card.appendChild(editBtn);

    const form = document.createElement('form');
    form.className = 'edit-form';
    form.style.display = 'none';

    const fields = [
        { key: 'name',        label: 'Name' },
        { key: 'device_type', label: 'Device type', options: ['', 'ESP32', 'Arduino'] },
        { key: 'sensor_type', label: 'Sensor type' },
        { key: 'location',    label: 'Location' },
        { key: 'lat',         label: 'Latitude',  type: 'number', step: 'any', placeholder: '42.3314' },
        { key: 'lng',         label: 'Longitude', type: 'number', step: 'any', placeholder: '-83.0458' },
    ];

    const inputs = {};
    fields.forEach(f => {
        const lbl = document.createElement('label');
        lbl.textContent = f.label;
        let input;
        if (f.options) {
            input = document.createElement('select');
            f.options.forEach(opt => {
                const o = document.createElement('option');
                o.value = opt;
                o.textContent = opt || '—';
                if ((collector[f.key] || '') === opt) o.selected = true;
                input.appendChild(o);
            });
        } else {
            input = document.createElement('input');
            input.type = f.type || 'text';
            if (f.step) input.step = f.step;
            if (f.placeholder) input.placeholder = f.placeholder;
            input.value = collector[f.key] ?? '';
        }
        lbl.appendChild(input);
        form.appendChild(lbl);
        inputs[f.key] = input;
    });

    const actions = document.createElement('div');
    actions.className = 'form-actions';
    const saveBtn = document.createElement('button');
    saveBtn.type = 'submit';
    saveBtn.className = 'btn btn-save';
    saveBtn.textContent = 'Save';
    const cancelBtn = document.createElement('button');
    cancelBtn.type = 'button';
    cancelBtn.className = 'btn btn-muted';
    cancelBtn.textContent = 'Cancel';
    actions.appendChild(saveBtn);
    actions.appendChild(cancelBtn);
    form.appendChild(actions);

    const status = document.createElement('p');
    status.className = 'save-status';
    form.appendChild(status);
    card.appendChild(form);

    editBtn.onclick = () => {
        form.style.display = 'grid';
        editBtn.style.display = 'none';
        status.textContent = '';
    };

    cancelBtn.onclick = () => {
        form.style.display = 'none';
        editBtn.style.display = '';
    };

    form.onsubmit = async (e) => {
        e.preventDefault();
        const body = {};
        fields.forEach(f => {
            const raw = inputs[f.key].value.trim();
            if (f.type === 'number') {
                body[f.key] = raw === '' ? null : parseFloat(raw);
            } else {
                body[f.key] = raw || null;
            }
        });
        saveBtn.disabled = true;
        status.textContent = '';
        try {
            const res = await fetch(`/api/collectors/${encodeURIComponent(collector.id)}`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body),
            });
            if (!res.ok) throw new Error((await res.json()).error);
            const updated = await res.json();

            nameEl.textContent = updated.name || '(unnamed)';
            meta.innerHTML =
                `Device: ${esc(updated.device_type) || '—'}<br>` +
                `Sensors: ${esc(updated.sensor_type) || '—'}<br>` +
                `Location: ${esc(updated.location) || '—'}<br>` +
                `Lat/Lng: ${updated.lat != null && updated.lng != null ? `${updated.lat}, ${updated.lng}` : '—'}<br>` +
                `Registered: ${created}<br>` +
                `Last seen: ${lastSeen}`;

            fields.forEach(f => { inputs[f.key].value = updated[f.key] || ''; });
            collector = updated;

            status.style.color = 'var(--accent)';
            status.textContent = 'Saved.';
            setTimeout(() => { status.textContent = ''; }, 2000);
        } catch (err) {
            status.style.color = '#e74c3c';
            status.textContent = `Error: ${err.message}`;
        } finally {
            saveBtn.disabled = false;
        }
    };

    return card;
}

function esc(str) {
    if (!str) return '';
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ── Primary Collector save ────────────────────────────────────────────────────

document.getElementById('save-primary').onclick = async function () {
    const id = document.getElementById('primary-collector-select').value;
    const status = document.getElementById('primary-status');
    this.disabled = true;
    try {
        const res = await fetch('/api/settings', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ key: 'primary_collector_id', value: id || null }),
        });
        if (!res.ok) throw new Error((await res.json()).error);
        status.style.color = 'var(--accent)';
        status.textContent = 'Saved.';
    } catch (err) {
        status.style.color = '#e74c3c';
        status.textContent = `Error: ${err.message}`;
    } finally {
        this.disabled = false;
        setTimeout(() => { status.textContent = ''; }, 2000);
    }
};

// ── Init ──────────────────────────────────────────────────────────────────────

loadCollectors();
</script>
