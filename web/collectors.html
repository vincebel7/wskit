<link href="/css/style.css" rel="stylesheet" type="text/css">
<script>window._headerConfig = { title: 'Collectors', icon: '📡', nav: 'collectors' };</script>
<div id="page-header"></div>
<script src="/js/header.js"></script>

<div id="collectors-container" style="max-width: 900px; margin: 0 auto; padding: 0 16px;"></div>

<script>
async function loadCollectors() {
    const container = document.getElementById('collectors-container');
    try {
        const res = await fetch('/api/collectors');
        if (!res.ok) throw new Error((await res.json()).error);
        const collectors = await res.json();
        container.innerHTML = '';

        if (!collectors.length) {
            const p = document.createElement('p');
            p.style.cssText = 'text-align:center; color:#7f8c8d;';
            p.textContent = 'No collectors registered yet.';
            container.appendChild(p);
            return;
        }

        collectors.forEach(c => container.appendChild(buildCard(c)));
    } catch(err) {
        const p = document.createElement('p');
        p.style.cssText = 'text-align:center; color:#e74c3c;';
        p.textContent = `Error loading collectors: ${err.message}`;
        container.appendChild(p);
    }
}

function buildCard(collector) {
    const card = document.createElement('div');
    card.className = 'collector-card';

    // Header row
    const header = document.createElement('div');
    header.className = 'card-header';

    const left = document.createElement('div');
    const nameEl = document.createElement('h3');
    nameEl.textContent = collector.name || '(unnamed)';
    const macEl = document.createElement('div');
    macEl.className = 'mac';
    macEl.textContent = collector.id;
    left.appendChild(nameEl);
    left.appendChild(macEl);

    const meta = document.createElement('div');
    meta.className = 'collector-meta';
    const created = new Date(collector.created_at).toLocaleString('en-US');
    meta.innerHTML =
        `Device: ${esc(collector.device_type) || '—'}<br>` +
        `Sensors: ${esc(collector.sensor_type) || '—'}<br>` +
        `Location: ${esc(collector.location) || '—'}<br>` +
        `Registered: ${created}`;

    header.appendChild(left);
    header.appendChild(meta);
    card.appendChild(header);

    // Edit button
    const editBtn = document.createElement('button');
    editBtn.className = 'btn btn-primary';
    editBtn.textContent = 'Edit';
    editBtn.style.marginTop = '10px';
    card.appendChild(editBtn);

    // Edit form (hidden initially)
    const form = document.createElement('form');
    form.className = 'edit-form';
    form.style.display = 'none';

    const fields = [
        { key: 'name',        label: 'Name' },
        { key: 'device_type', label: 'Device type', options: ['', 'ESP32', 'Arduino'] },
        { key: 'sensor_type', label: 'Sensor type' },
        { key: 'location',    label: 'Location' },
    ];

    const inputs = {};
    fields.forEach(f => {
        const lbl = document.createElement('label');
        lbl.textContent = f.label;
        let input;
        if (f.options) {
            input = document.createElement('select');
            f.options.forEach(opt => {
                const o = document.createElement('option');
                o.value = opt;
                o.textContent = opt || '—';
                if ((collector[f.key] || '') === opt) o.selected = true;
                input.appendChild(o);
            });
        } else {
            input = document.createElement('input');
            input.type = 'text';
            input.value = collector[f.key] || '';
        }
        lbl.appendChild(input);
        form.appendChild(lbl);
        inputs[f.key] = input;
    });

    const actions = document.createElement('div');
    actions.className = 'form-actions';

    const saveBtn = document.createElement('button');
    saveBtn.type = 'submit';
    saveBtn.className = 'btn btn-save';
    saveBtn.textContent = 'Save';

    const cancelBtn = document.createElement('button');
    cancelBtn.type = 'button';
    cancelBtn.className = 'btn btn-muted';
    cancelBtn.textContent = 'Cancel';

    actions.appendChild(saveBtn);
    actions.appendChild(cancelBtn);
    form.appendChild(actions);

    const status = document.createElement('p');
    status.className = 'save-status';
    form.appendChild(status);

    card.appendChild(form);

    // Toggle edit form
    editBtn.onclick = () => {
        form.style.display = 'grid';
        editBtn.style.display = 'none';
        status.textContent = '';
    };

    cancelBtn.onclick = () => {
        form.style.display = 'none';
        editBtn.style.display = '';
    };

    form.onsubmit = async (e) => {
        e.preventDefault();
        const body = {};
        fields.forEach(f => {
            body[f.key] = inputs[f.key].value.trim() || null;
        });

        saveBtn.disabled = true;
        status.textContent = '';

        try {
            const res = await fetch(`/api/collectors/${encodeURIComponent(collector.id)}`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body),
            });
            if (!res.ok) throw new Error((await res.json()).error);
            const updated = await res.json();

            // Reflect saved values back into the card header
            nameEl.textContent = updated.name || '(unnamed)';
            meta.innerHTML =
                `Device: ${esc(updated.device_type) || '—'}<br>` +
                `Sensors: ${esc(updated.sensor_type) || '—'}<br>` +
                `Location: ${esc(updated.location) || '—'}<br>` +
                `Registered: ${created}`;

            // Sync input defaults
            fields.forEach(f => { inputs[f.key].value = updated[f.key] || ''; });
            collector = updated;

            status.style.color = '#27ae60';
            status.textContent = 'Saved.';
            setTimeout(() => { status.textContent = ''; }, 2000);
        } catch(err) {
            status.style.color = '#e74c3c';
            status.textContent = `Error: ${err.message}`;
        } finally {
            saveBtn.disabled = false;
        }
    };

    return card;
}

// Escape HTML for values inserted via innerHTML
function esc(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

loadCollectors();
</script>
